name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  readme-hero:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Serialize pushes to main: two releases published close together must not
    # race on `git push origin main` (the loser would fail non-fast-forward).
    concurrency:
      group: readme-hero
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[docs]"
      - run: python scripts/render_readme_hero.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add examples/rnaseq_dark_animated.svg examples/rnaseq_light_animated.svg examples/rnaseq_auto_dark.png
          if git diff --cached --quiet; then
            echo "README hero renders unchanged, nothing to commit."
          else
            git commit -m "chore(examples): regenerate README hero renders for ${{ github.event.release.tag_name }} [skip ci]"
            git push origin main
          fi
