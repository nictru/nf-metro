name: PR render preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  render-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      # Incremental only when every changed file is a fixture .mmd; any other
      # change (engine code, build scripts, deps, docs) renders the full corpus,
      # so an engine change can never hide behind a reused base SVG.
      - name: Determine render strategy
        id: strategy
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          echo "render_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          changed="$(git diff --name-only "$base" "$head")"
          echo "Changed files:"; echo "$changed"
          allowed='^(examples/|tests/fixtures/).*\.mmd$'
          if [ -n "$changed" ] && [ -z "$(printf '%s\n' "$changed" | grep -vE "$allowed" || true)" ]; then
            echo "mode=incremental" >> "$GITHUB_OUTPUT"
            echo "Render mode: INCREMENTAL"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "Render mode: FULL"
          fi
          printf '%s\n' "$changed" > /tmp/changed_mmd.txt

      # Base renders depend only on the base SHA, so cache them. Re-pushes to a
      # PR share the same base SHA and reuse this instead of re-rendering.
      - name: Cache base renders
        id: base-cache
        uses: actions/cache@v4
        with:
          path: /tmp/base_renders
          key: render-base-${{ github.event.pull_request.base.sha }}

      - name: Install (PR head)
        run: pip install -e ".[docs]"

      - name: Render base
        if: steps.base-cache.outputs.cache-hit != 'true'
        run: |
          git checkout '${{ github.event.pull_request.base.sha }}'
          pip install -e ".[docs]"
          python scripts/build_gallery.py --debug
          mkdir -p /tmp/base_renders
          cp docs/assets/renders/*.svg docs/assets/renders/manifest.json /tmp/base_renders/
          cp docs/assets/renders/metrics.json /tmp/base_renders/ 2>/dev/null || true
          git checkout '${{ steps.strategy.outputs.render_ref }}'
          pip install -e ".[docs]"

      - name: Render PR head
        run: |
          rm -rf docs/assets/renders
          mkdir -p docs/assets/renders
          if [ "${{ steps.strategy.outputs.mode }}" = "incremental" ]; then
            cp -r /tmp/base_renders/. docs/assets/renders/
            python scripts/build_gallery.py --debug --changed-list /tmp/changed_mmd.txt
          else
            python scripts/build_gallery.py --debug
          fi
          mkdir -p /tmp/pr_renders
          cp docs/assets/renders/*.svg docs/assets/renders/manifest.json /tmp/pr_renders/
          cp docs/assets/renders/metrics.json /tmp/pr_renders/ 2>/dev/null || true

      - name: Generate render diff
        id: diff
        run: |
          set +e
          python scripts/build_render_diff.py \
            /tmp/base_renders /tmp/pr_renders /tmp/diff_site \
            --pr ${{ github.event.number }}
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            exit $EXIT_CODE
          fi

      # A fork PR's GITHUB_TOKEN is read-only, so this job cannot deploy Pages or
      # comment. Hand the site plus the publish decision to pr-render-publish.yml,
      # which runs from the base repo with a write token via workflow_run.
      - name: Stage preview metadata
        run: |
          mkdir -p /tmp/diff_site /tmp/preview_meta
          echo "${{ github.event.number }}" > /tmp/preview_meta/pr_number.txt
          echo "${{ steps.diff.outputs.has_changes }}" > /tmp/preview_meta/has_changes.txt

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: render-preview
          path: |
            /tmp/diff_site
            /tmp/preview_meta
          retention-days: 3
