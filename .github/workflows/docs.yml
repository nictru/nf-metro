name: Deploy docs

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install nf-metro (gallery generator + wheel build)
        run: pip install -e "." build

      # --- Generate dynamic content into the Astro project ---
      - name: Build playground wheel
        run: |
          rm -rf website/public/playground/wheels
          python -m build --wheel -o website/public/playground/wheels
          WHEEL=$(basename website/public/playground/wheels/*.whl)
          printf '{"wheel": "%s"}\n' "$WHEEL" > website/public/playground/wheels/index.json

      - name: Build playground example manifest
        run: python scripts/build_playground_examples.py

      - name: Build gallery + pipelines (render SVGs, generate pages)
        run: python scripts/build_gallery.py

      # --- Build the Astro / Starlight site ---
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install npm dependencies
        working-directory: website
        run: npm ci

      - name: Build site
        working-directory: website
        # GITHUB_TOKEN lets the Header release-pill query avoid rate limits.
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run build

      # --- Publish to the gh-pages branch root, preserving PR previews (_pr/) ---
      - name: Resolve deploy version label
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to gh-pages
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Worktree on the gh-pages branch (create it if missing).
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages --depth=1
            git worktree add gh-pages origin/gh-pages
          else
            git worktree add --orphan -b gh-pages gh-pages
          fi

          # Replace the site root but keep PR previews (_pr/) and version archives.
          find gh-pages -mindepth 1 -maxdepth 1 \
            ! -name '.git' ! -name '_pr' ! -name '_versions' -exec rm -rf {} +
          cp -a website/dist/. gh-pages/

          # Archive an immutable copy of tagged releases under _versions/<x.y.z>/.
          if [ "${{ github.event_name }}" = "release" ]; then
            rm -rf "gh-pages/_versions/$VERSION"
            mkdir -p "gh-pages/_versions/$VERSION"
            cp -a website/dist/. "gh-pages/_versions/$VERSION/"
          fi

          touch gh-pages/.nojekyll
          cd gh-pages
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to publish."
          else
            git commit -m "docs: deploy ${VERSION} (${GITHUB_SHA::8})"
            git push origin gh-pages
          fi
